<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <title>Interview Feedback</title>

    <style>
        * {
            box-sizing: border-box;
        }

        body {
            margin: 0;
            font-family: 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(to right, #eef2f7, #f8fafc);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        /* CARD */
        .card {
            width: 460px;
            background: #ffffff;
            border-radius: 16px;
            box-shadow: 0 20px 50px rgba(0,0,0,0.08);
            overflow: hidden;
            animation: fade 0.3s ease;
        }

        @keyframes fade {
            from {
                opacity: 0;
                transform: translateY(10px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        /* HEADER */
        .header {
            padding: 24px;
            text-align: center;
            border-bottom: 1px solid #e5e7eb;
        }

            .header img {
                width: 130px;
            }

            .header h2 {
                margin: 10px 0 0;
            }

        /* CANDIDATE */
        .candidate {
            padding: 14px;
            text-align: center;
            background: #f1f5f9;
            color: #2563eb;
            font-weight: 500;
        }

        /* CONTENT */
        .content {
            padding: 26px;
        }

        .group {
            margin-bottom: 22px;
        }

        .label {
            font-size: 13px;
            font-weight: 600;
            margin-bottom: 8px;
        }

        /* ⭐ STARS */
        .stars {
            display: flex;
            justify-content: center;
            gap: 10px;
            font-size: 30px;
        }

            .stars span {
                color: #e5e7eb;
                cursor: pointer;
                transition: 0.2s;
            }

                .stars span.active {
                    color: #f59e0b;
                }

        /* INPUTS */
        textarea, select {
            width: 100%;
            padding: 12px;
            border-radius: 10px;
            border: 1px solid #d1d5db;
        }

            textarea:focus, select:focus {
                border-color: #2563eb;
                outline: none;
                box-shadow: 0 0 0 2px rgba(37,99,235,0.1);
            }

        /* ERROR */
        .error {
            border-color: #dc2626 !important;
        }

        .error-text {
            font-size: 12px;
            color: #dc2626;
            margin-top: 5px;
        }

        /* COUNTER */
        .counter {
            font-size: 11px;
            text-align: right;
            color: #6b7280;
        }

        /* BUTTON */
        .btn {
            width: 100%;
            padding: 14px;
            background: linear-gradient(135deg,#2563eb,#1e40af);
            color: white;
            border: none;
            border-radius: 10px;
            font-weight: 600;
            cursor: pointer;
        }

            .btn:hover {
                transform: translateY(-1px);
                box-shadow: 0 8px 20px rgba(37,99,235,0.3);
            }

            .btn:disabled {
                background: #9ca3af;
                cursor: not-allowed;
            }

        /* SUCCESS MODAL */
        .success-modal {
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.4);
            display: none;
            justify-content: center;
            align-items: center;
        }

        .success-box {
            background: white;
            padding: 30px;
            border-radius: 16px;
            text-align: center;
            animation: pop 0.3s ease;
        }

        .check {
            font-size: 40px;
            color: #16a34a;
        }

        @keyframes pop {
            from {
                transform: scale(0.8);
                opacity: 0;
            }

            to {
                transform: scale(1);
                opacity: 1;
            }
        }
    </style>
</head>

<body>

    <div class="card">

        <div class="header">
            <img src="/images/pirnav-logo.png" />
            <h2>Interview Feedback</h2>
        </div>

        <div class="candidate" id="candidateInfo">
            Loading candidate...
        </div>

        <div class="content">

            <!-- Rating -->
            <div class="group">
                <label class="label">Rate Candidate</label>
                <div class="stars" id="stars">
                    <span>★</span><span>★</span><span>★</span><span>★</span><span>★</span>
                </div>
                <div id="ratingError" class="error-text"></div>
            </div>

            <!-- Comments -->
            <div class="group">
                <label class="label">Comments</label>
                <textarea id="comments"></textarea>
                <div id="commentError" class="error-text"></div>
                <div id="counter" class="counter">0 characters</div>
            </div>

            <!-- Status -->
            <div class="group">
                <label class="label">Decision</label>
                <select id="status">
                    <option>Selected</option>
                    <option>Rejected</option>
                    <option>On Hold</option>
                </select>
            </div>

            <button class="btn" id="btn">Submit Feedback</button>

        </div>
    </div>

    <!-- SUCCESS MODAL -->
    <div id="successModal" class="success-modal">
        <div class="success-box">
            <div class="check">✔</div>
            <h3>Feedback Submitted</h3>
            <p>Thank you for your response</p>
        </div>
    </div>

    <script>
        const baseUrl = "https://farrandly-interalar-talon.ngrok-free.dev";

        const token = new URLSearchParams(window.location.search).get('token');

        console.log("Token:", token);

        

        let selectedRating = 0;
        const stars = document.querySelectorAll("#stars span");

        /* ⭐ STAR INTERACTION */
        stars.forEach((star, index) => {
            star.addEventListener("click", () => {
                selectedRating = index + 1;
                updateStars();
                clearError("ratingError");
            });

            star.addEventListener("mouseenter", () => {
                stars.forEach((s, i) => s.style.color = i <= index ? "#fbbf24" : "#e5e7eb");
            });

            star.addEventListener("mouseleave", () => updateStars());
        });

        function updateStars() {
            stars.forEach((s, i) => s.style.color = i < selectedRating ? "#f59e0b" : "#e5e7eb");
        }

        /* ======================
           LOAD CANDIDATE (FIXED)
        ====================== */

        if (!token) { 
            document.getElementById("candidateInfo").innerText = "Invalid interview link";
        } else {
            fetch(`${baseUrl}/api/Interview/details-by-token?token=${token}`)
                .then(res => {
                    if (!res.ok) throw new Error("Failed to fetch candidate");
                    return res.json();
                })
                .then(d => {
                    console.log("Candidate:", d);

                    document.getElementById("candidateInfo").innerText =
                        `${d.candidateName || "N/A"} • ${d.jobTitle || "N/A"}`;
                })
                .catch(err => {
                    console.error(err);
                    document.getElementById("candidateInfo").innerText =
                        "Failed to load candidate details";
                });
        }

        /* COUNTER */
        comments.oninput = () => {
            counter.innerText = comments.value.length + " characters";
        };

        /* VALIDATION */
        function validate() {
            let valid = true;

            if (selectedRating === 0) {
                ratingError.innerText = "Select rating";
                valid = false;
            } else {
                ratingError.innerText = "";
            }

            if (comments.value.trim().length < 5) {
                commentError.innerText = "Minimum 5 characters required";
                comments.classList.add("error");
                valid = false;
            } else {
                commentError.innerText = "";
                comments.classList.remove("error");
            }

            return valid;
        }

        function clearError(id) {
            document.getElementById(id).innerText = "";
        }

        /* ======================
           SUBMIT (FIXED)
        ====================== */

            btn.onclick = () => {

            if (!token) {
                alert("Invalid interview link");
                return;
            }

            if (!validate()) return;

            btn.disabled = true;
            btn.innerText = "Submitting...";

                const payload = {
                    rating: selectedRating,
                    comments: comments.value,
                    status: document.getElementById("status").value   
                };

            console.log("Payload:", payload);

                fetch(`${baseUrl}/api/InterviewFeedback/submit?token=${token}`, {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify(payload)
                })
                    .then(async res => {
                        const data = await res.json();

                        if (!res.ok) {
                            throw new Error(data.message || "Submit failed");
                        }

                        return data;
                    })
                    .then(data => {
                        if (data.success) {
                            successModal.style.display = "flex";

                            setTimeout(() => {
                                location.reload();
                            }, 2500);
                        } else {
                            alert(data.message || "Failed");
                        }
                    })
                    .catch(err => {
                        console.error(err);
                        alert("Error: " + err.message);
                        btn.disabled = false;
                        btn.innerText = "Submit Feedback";
                    });
        };
    </script>

</body>
</html>
